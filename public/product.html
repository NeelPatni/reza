<script>
const API = "https://khaki-cod-366220.hostingersite.com/api";

let currentProduct = null;

// =======================
// LOAD PRODUCT
// =======================
async function loadProduct() {

    const slug = new URLSearchParams(window.location.search).get("slug");

    if (!slug) {
        alert("Product not found");
        return;
    }

    try {

        const res = await fetch(`${API}/products/slug/${slug}`);
        const data = await res.json();

        if (!data.success) {
            alert("Product not found");
            return;
        }

        currentProduct = data.product;

        const p = currentProduct;

        // TEXT
        document.getElementById("title").innerText = p.name;
        document.getElementById("sku").innerText = p.sku || "-";

        document.getElementById("price").innerText =
            (p.salePrice || p.price).toLocaleString("en-IN");

        document.getElementById("oldPrice").innerText =
            p.salePrice && p.salePrice < p.price
            ? p.price.toLocaleString("en-IN")
            : "";

        document.getElementById("discount").innerText =
            p.discountPercentage
            ? `${p.discountPercentage}% OFF`
            : "";

        document.getElementById("stock").innerHTML =
            p.stock > 0
            ? "✔ In Stock"
            : "❌ Out of Stock";

        document.getElementById("category").innerHTML =
            `Category : ${p.category.name}`;

        document.getElementById("description").innerHTML =
            p.description || "";

        // MAIN MEDIA
        changeMedia(
            p.productVideo && p.productVideo !== ""
                ? p.productVideo
                : p.mainImage,

            p.productVideo && p.productVideo !== ""
                ? "video"
                : "image"
        );

        // SIZE
        const sizes = document.getElementById("sizes");

        sizes.innerHTML = "";

        p.sizes.forEach((s, index) => {

            sizes.innerHTML += `
                <button
                    type="button"
                    class="size-btn ${index==0?"active":""}"
                    onclick="selectSize(this)">
                    ${s.size}
                </button>
            `;

        });

        // GALLERY
        let gallery=[];

        gallery.push({
            url:p.mainImage,
            type:"image"
        });

        if(p.productVideo){

            gallery.push({
                url:p.productVideo,
                type:"video"
            });

        }

        (p.subImages || []).forEach(img=>{
            gallery.push(img);
        });

        const thumbs=document.getElementById("thumbs");

        thumbs.innerHTML="";

        gallery.forEach(item=>{

            if(item.type=="video"){

                thumbs.innerHTML+=`
                <video
                    class="thumb"
                    muted
                    onclick="changeMedia('${item.url}','video')">
                    <source src="${item.url}">
                </video>
                `;

            }else{

                thumbs.innerHTML+=`
                <img
                    class="thumb"
                    src="${item.url}"
                    onclick="changeMedia('${item.url}','image')">
                `;

            }

        });

    }
    catch(err){

        console.log(err);

    }

}


// =======================
// CHANGE MEDIA
// =======================
function changeMedia(url,type){

    const media=document.getElementById("mediaBox");

    if(type=="video"){

        media.innerHTML=`
        <video
            controls
            autoplay
            muted
            playsinline
            style="width:100%;height:100%;object-fit:cover;">
            <source src="${url}">
        </video>`;

    }

    else{

        media.innerHTML=`
        <img
            id="mainImage"
            src="${url}"
            style="width:100%;height:100%;object-fit:cover;">`;

    }

}


// =======================
// SIZE
// =======================
function selectSize(btn){

    document.querySelectorAll(".size-btn").forEach(item=>{
        item.classList.remove("active");
    });

    btn.classList.add("active");

}

function getSelectedSize(){

    const active = document.querySelector(".size-btn.active");

    return active ? active.innerText.trim() : null;

}


// =======================
// ADD TO CART
// =======================
function addToCart(){

    if(!currentProduct){

        alert("Product not loaded");
        return;

    }

    const size = getSelectedSize();

    if(!size){

        alert("Please select size");
        return;

    }

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const product = {

        id: currentProduct._id,

        slug: currentProduct.slug,

        title: currentProduct.name,

        image: currentProduct.mainImage,

        price: currentProduct.salePrice || currentProduct.price,

        size: size,

        qty: 1

    };

    const exist = cart.find(item =>

        item.id === product.id &&
        item.size === product.size

    );

    if(exist){

        exist.qty += 1;

    }else{

        cart.push(product);

    }

    localStorage.setItem("cart", JSON.stringify(cart));

    updateCartCount();

    animateCart();

    alert("Product added to cart successfully.");

}



// =======================
// CHECKOUT
// =======================
function checkoutProduct(){

    if(!currentProduct){

        alert("Product not loaded");
        return;

    }

    const size = getSelectedSize();

    if(!size){

        alert("Please select size");
        return;

    }

    const checkoutItem = {

        id: currentProduct._id,

        slug: currentProduct.slug,

        title: currentProduct.name,

        image: currentProduct.mainImage,

        price: currentProduct.salePrice || currentProduct.price,

        size: size,

        qty: 1

    };

    localStorage.setItem(
        "checkoutItem",
        JSON.stringify(checkoutItem)
    );

    window.location.href = "checkout.html";

}



// =======================
// GO TO CART
// =======================
function goToCart(){

    window.location.href = "cart.html";

}



// =======================
// CART COUNT
// =======================
function updateCartCount(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let total = 0;

    cart.forEach(item=>{

        total += item.qty || 1;

    });

    const count = document.getElementById("cartCount");

    if(count){

        count.innerText = total;

    }

}



// =======================
// CART ANIMATION
// =======================
function animateCart(){

    const icon = document.getElementById("cartCount");

    if(!icon) return;

    icon.style.transform = "scale(1.3)";

    setTimeout(()=>{

        icon.style.transform = "scale(1)";

    },200);

}



// =======================
// PAGE LOAD
// =======================
document.addEventListener("DOMContentLoaded",()=>{

    loadProduct();

    updateCartCount();

});

window.addEventListener("storage", updateCartCount);
</script>
