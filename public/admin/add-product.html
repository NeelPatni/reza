<!DOCTYPE html>
<html>
<head>
  <title>Products</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="../assets/css/add-product.css"
  >

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

  <style>
/* ===== NAVBAR ===== */
.top-navbar {
  width: 100%;
  background: #ffffff;
  padding: 14px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;

  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
  position:relative;
  top: 0;
  z-index: 999;
}

/* Logo */
.top-navbar .logo {
  font-weight: 800;
  font-size: 20px;
  color: #6c63ff;
}

/* Menu */
.nav-links {
  display: flex;
  gap: 25px;
  align-items: center;
}

.nav-links a {
  text-decoration: none;
  color: #475569;
  font-weight: 500;
  font-size: 14px;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-links a:hover {
  color: #6c63ff;
}

/* Active */
.nav-links a.active {
  color: #6c63ff;
  font-weight: 600;
}

/* Logout button */
.logout-btn {
  background: #f1f5f9;
  padding: 8px 14px;
  border-radius: 10px;
}

.logout-btn:hover {
  background: #e2e8f0;
}

/* Mobile */
@media(max-width:768px){
  .nav-links {
    gap: 12px;
    font-size: 12px;
  }
}
</style>


<div class="top-navbar">
  <div class="logo">Admin</div>

  <div class="nav-links">
    <a href="dashboard.html" class="">
      <i class="fas fa-chart-line"></i> Dashboard
    </a>

    <a href="#">
      <i class="fas fa-layer-group"></i> Categories
    </a>

    <a href="products.html">
      <i class="fas fa-box"></i> Products
    </a>

    <a href="#">
      <i class="fas fa-cart-shopping"></i> Orders
    </a>

    <a href="#">
      <i class="fas fa-users"></i> Users
    </a>

    <a href="#">
      <i class="fas fa-gear"></i> Settings
    </a>

    <a href="#" onclick="logout()" class="logout-btn">
      <i class="fas fa-right-from-bracket"></i> Logout
    </a>
  </div>
</div>


<div class="container-fluid p-4">

  <div
    class="d-flex justify-content-between align-items-center mb-4"
  >
    <h2>
      <i class="fas fa-plus-circle me-2"></i>
      Add Product
    </h2>

    <a
      href="products.html"
      class="btn btn-secondary"
    >
      Back
    </a>
  </div>



  <form id="productForm">

    <!-- Basic Information -->

    <div class="card mb-4">
      <div class="card-header">
        Product Information
      </div>

      <div class="card-body">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label>
              Product Name
            </label>

            <input
              type="text"
              id="name"
              class="form-control"
              required
            >
          </div>

          <div class="col-md-6 mb-3">
            <label>
              SKU
            </label>

            <input
              type="text"
              id="sku"
              class="form-control"
              required
            >
          </div>

          <div class="col-md-6 mb-3">
            <label>
              Category
            </label>

            <select
  id="category"
  class="form-select"
  required
>
  <option value="">
    Select Category
  </option>
</select>
          </div>

          <div class="col-md-12 mb-3">
            <label>
              Description
            </label>

            <textarea
              id="description"
              class="form-control"
              rows="4"
            ></textarea>
          </div>

        </div>

      </div>
    </div>

    <!-- Pricing -->

    <div class="card mb-4">

      <div class="card-header">
        Pricing
      </div>

      <div class="card-body">

        <div class="row">

          <div class="col-md-6">
            <label>
              Price
            </label>

            <input
              type="number"
              id="price"
              class="form-control"
              required
            >
          </div>

          <div class="col-md-6">
            <label>
              Sale Price
            </label>

            <input
              type="number"
              id="salePrice"
              class="form-control"
            >
          </div>

        </div>

      </div>

    </div>

    <!-- Inventory -->

    <!-- Inventory -->
<div class="card mb-4">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h6 class="mb-0">
      <i class="fas fa-boxes me-2"></i>
      Sizes & Inventory
    </h6>

    <button
      type="button"
      id="addSizeBtn"
      class="btn btn-primary btn-sm"
    >
      <i class="fas fa-plus"></i>
      Add Size
    </button>
  </div>

  <div class="card-body">

    <div
      id="sizesContainer"
    >

      <!-- First Row -->
      <div
        class="row g-2 mb-3 size-row"
      >
        <div class="col-md-5">
          <select
            class="form-select size"
          >
            <option value="">
              Select Size
            </option>

            <option>
              XS
            </option>

            <option>
              S
            </option>

            <option>
              M
            </option>

            <option>
              L
            </option>

            <option>
              XL
            </option>

            <option>
              XXL
            </option>

            <option>
              Free Size
            </option>
          </select>
        </div>

        <div class="col-md-5">
          <input
            type="number"
            class="form-control quantity"
            placeholder="Quantity"
          >
        </div>

        <div class="col-md-2">
          <button
            type="button"
            class="btn btn-danger removeBtn"
          >
            <i
              class="fas fa-trash"
            ></i>
          </button>
        </div>

      </div>

    </div>

  </div>
</div>

    <!-- Images -->

    <div class="card mb-4">

      <div class="card-header">
        Images
      </div>

      <div class="card-body">

   

      <div class="mb-3">
  <label>Main Product Image</label>

<input
  type="file"
  id="mainImage"
  class="form-control"
  accept="image/*,video/*"
/>
</div>

<div class="row">

  <div class="col-md-3">
    <label>Sub Image 1</label>
    <input
      type="file"
      id="subImage1"
      class="form-control"
      accept="image/*,video/*"
    />
  </div>

  <div class="col-md-3">
    <label>Sub Image 2</label>
    <input
      type="file"
      id="subImage2"
      class="form-control"
      accept="image/*,video/*"
    />
  </div>

  <div class="col-md-3">
    <label>Sub Image 3</label>
    <input
      type="file"
      id="subImage3"
      class="form-control"
      accept="image/*,video/*"
    />
  </div>

  <div class="col-md-3">
    <label>Sub Image 4</label>
    <input
      type="file"
      id="subImage4"
      class="form-control"
      accept="image/*,video/*"
    />
  </div>

</div>

<div class="mb-3">
  <label>Product Video</label>

  <input
    type="file"
    id="productVideo"
    class="form-control"
    accept="video/*"
  >
</div>

      </div>

    </div>

    <!-- Settings -->

    <div class="card mb-4">

      <div class="card-header">
        Settings
      </div>

      <div class="card-body">

        <div class="form-check mb-3">
          <input
            type="checkbox"
            id="featured"
            class="form-check-input"
          >

          <label
            class="form-check-label"
          >
            Featured Product
          </label>
        </div>

        <div>

          <label>
            Status
          </label>

          <select
            id="status"
            class="form-select"
          >
            <option value="active">
              Active
            </option>

            <option value="inactive">
              Inactive
            </option>

          </select>

        </div>

      </div>

    </div>

    <button
  type="submit"
  class="btn btn-success"
>
  Save Product
</button>

  </form>

</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/add-product.js"></script>

</body>
</html>
