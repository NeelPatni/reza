<!DOCTYPE html>
<html>
<head>
  <title>Categories</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="assets/css/products.css"
  >
</head>

<body>

 <!-- TOP NAVBAR -->
<div class="top-navbar">
  <div class="logo">Admin</div>

  <!-- DESKTOP MENU -->
  <div class="nav-links">
    <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="#"><i class="fas fa-layer-group"></i> Categories</a>
    <a href="products.html" class="active"><i class="fas fa-box"></i> Products</a>
    <a href="#"><i class="fas fa-cart-shopping"></i> Orders</a>
    <a href="#"><i class="fas fa-users"></i> Users</a>
    <a href="#"><i class="fas fa-gear"></i> Settings</a>
    <a href="#" onclick="logout()" class="logout-btn">
      <i class="fas fa-right-from-bracket"></i> Logout
    </a>
  </div>

  <!-- MOBILE MENU BUTTON -->
  <button class="menu-toggle" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </button>
</div>

<!-- MOBILE SIDEBAR -->
<div class="mobile-menu" id="mobileMenu">

  <div class="mobile-header">
    <h3>Admin</h3>
    <button onclick="toggleMenu()">✕</button>
  </div>

  <a href="dashboard.html">Dashboard</a>
  <a href="#">Categories</a>
  <a href="products.html">Products</a>
  <a href="#">Orders</a>
  <a href="#">Users</a>
  <a href="#">Settings</a>
  <a href="#" onclick="logout()">Logout</a>

</div>

<style>
  /* ===== NAVBAR ===== */
.top-navbar {
  width: 100%;
  background: #ffffff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

/* LOGO */
.logo {
  font-weight: 800;
  font-size: 20px;
  color: #6c63ff;
}

/* DESKTOP MENU */
.nav-links {
  display: flex;
  gap: 25px;
  align-items: center;
}

.nav-links a {
  text-decoration: none;
  color: #475569;
  font-size: 14px;
}

/* MOBILE BUTTON */
.menu-toggle {
  display: none;
  background: #111827;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 18px;
}

/* ===== MOBILE MENU ===== */
.mobile-menu {
  position: fixed;
  top: 0;
  right: -100%;
  width: 260px;
  height: 100%;
  background: #111827;
  color: #fff;
  padding: 20px;
  transition: 0.3s;
  z-index: 9999;
}

.mobile-menu.active {
  right: 0;
}

.mobile-menu a {
  display: block;
  color: #fff;
  text-decoration: none;
  margin: 15px 0;
}

/* HEADER */
.mobile-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {

  .nav-links {
    display: none;
  }

  .menu-toggle {
    display: block;
  }
}
</style>

<script>
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("active");
}
</script>

<div class="container-fluid p-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">

        <div>
            <h2 class="fw-bold mb-1">
                <i class="fas fa-layer-group text-primary me-2"></i>
                Categories Management
            </h2>

            <p class="text-muted mb-0">
                Manage all categories
            </p>
        </div>

        <a
            href="add-category.html"
            class="btn btn-primary mt-3 mt-md-0"
        >
            <i class="fas fa-plus me-2"></i>
            Add Category
        </a>

    </div>



    <!-- FILTER -->

    <div class="card shadow-sm border-0 rounded-4 mb-4">

        <div class="card-body">

            <div class="row">

                <div class="col-md-8">

                    <input
                        type="text"
                        id="searchInput"
                        class="form-control"
                        placeholder="Search Category..."
                    >

                </div>

                <div class="col-md-4">

                    <select
                        id="statusFilter"
                        class="form-select"
                    >

                        <option value="">
                            All Status
                        </option>

                        <option value="active">
                            Active
                        </option>

                        <option value="inactive">
                            Inactive
                        </option>

                    </select>

                </div>

            </div>

        </div>

    </div>



    <!-- TABLE -->

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-header bg-white">

            <div
                class="d-flex justify-content-between align-items-center"
            >

                <h5 class="mb-0">
                    Categories
                </h5>

                <span
                    class="badge bg-primary"
                    id="totalCategory"
                >
                    0 Categories
                </span>

            </div>

        </div>


        <div class="card-body p-0">

            <div class="table-responsive">

                <table class="table table-hover mb-0">

                    <thead>

                        <tr>

                            <th width="100">
                                Image
                            </th>

                            <th>
                                Name
                            </th>

                            <th>
                                Status
                            </th>

                            <th width="120">
                                Date
                            </th>

                            <th width="180">
                                Action
                            </th>

                        </tr>

                    </thead>

                    <tbody id="categoryTable">

                        <tr>

                            <td
                                colspan="5"
                                class="text-center p-5"
                            >

                                Loading....

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/categories.js"></script>


</body>
</html>
