<!DOCTYPE html>
<html>
<head>
  <title>Products</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="assets/css/products.css"
  >
</head>

<body>

 <!-- TOP NAVBAR -->
<div class="top-navbar">
  <div class="logo">Admin</div>

  <!-- DESKTOP MENU -->
  <div class="nav-links">
    <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="#"><i class="fas fa-layer-group"></i> Categories</a>
    <a href="products.html" class="active"><i class="fas fa-box"></i> Products</a>
    <a href="#"><i class="fas fa-cart-shopping"></i> Orders</a>
    <a href="#"><i class="fas fa-users"></i> Users</a>
    <a href="#"><i class="fas fa-gear"></i> Settings</a>
    <a href="#" onclick="logout()" class="logout-btn">
      <i class="fas fa-right-from-bracket"></i> Logout
    </a>
  </div>

  <!-- MOBILE MENU BUTTON -->
  <button class="menu-toggle" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </button>
</div>

<!-- MOBILE SIDEBAR -->
<div class="mobile-menu" id="mobileMenu">

  <div class="mobile-header">
    <h3>Admin</h3>
    <button onclick="toggleMenu()">✕</button>
  </div>

  <a href="dashboard.html">Dashboard</a>
  <a href="#">Categories</a>
  <a href="products.html">Products</a>
  <a href="#">Orders</a>
  <a href="#">Users</a>
  <a href="#">Settings</a>
  <a href="#" onclick="logout()">Logout</a>

</div>

<style>
  /* ===== NAVBAR ===== */
.top-navbar {
  width: 100%;
  background: #ffffff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

/* LOGO */
.logo {
  font-weight: 800;
  font-size: 20px;
  color: #6c63ff;
}

/* DESKTOP MENU */
.nav-links {
  display: flex;
  gap: 25px;
  align-items: center;
}

.nav-links a {
  text-decoration: none;
  color: #475569;
  font-size: 14px;
}

/* MOBILE BUTTON */
.menu-toggle {
  display: none;
  background: #111827;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 18px;
}

/* ===== MOBILE MENU ===== */
.mobile-menu {
  position: fixed;
  top: 0;
  right: -100%;
  width: 260px;
  height: 100%;
  background: #111827;
  color: #fff;
  padding: 20px;
  transition: 0.3s;
  z-index: 9999;
}

.mobile-menu.active {
  right: 0;
}

.mobile-menu a {
  display: block;
  color: #fff;
  text-decoration: none;
  margin: 15px 0;
}

/* HEADER */
.mobile-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {

  .nav-links {
    display: none;
  }

  .menu-toggle {
    display: block;
  }
}
</style>

<script>
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("active");
}
</script>

<div class="container-fluid p-4">

  <!-- Header -->
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4">

    <div>
      <h2 class="fw-bold mb-1">
        <i class="fas fa-box-open text-primary me-2"></i>
        Products Management
      </h2>

      <p class="text-muted mb-0">
        Manage all products, stock and pricing
      </p>
    </div>

    <a
      href="add-product.html"
      class="btn btn-primary mt-3 mt-md-0"
    >
      <i class="fas fa-plus me-2"></i>
      Add New Product
    </a>

  </div>

  <!-- Filters -->
  <div class="card shadow-sm border-0 rounded-4 mb-4">

    <div class="card-body">

      <div class="row g-3">

        <!-- Search -->
        <div class="col-lg-5">

          <div class="input-group">

            <span class="input-group-text bg-white">
              <i class="fas fa-search text-muted"></i>
            </span>

            <input
              type="text"
              id="searchInput"
              class="form-control border-start-0"
              placeholder="Search product by name..."
            >

          </div>

        </div>

        <!-- Category -->
        <div class="col-lg-3">

          <select
            id="categoryFilter"
            class="form-select"
          >
            <option value="">
              All Categories
            </option>
          </select>

        </div>

        <!-- Status -->
        <div class="col-lg-2">

          <select
            id="statusFilter"
            class="form-select"
          >
            <option value="">
              All Status
            </option>

            <option value="active">
              Active
            </option>

            <option value="inactive">
              Inactive
            </option>

          </select>

        </div>

        <!-- Reset -->
        <div class="col-lg-2">

          <button
            class="btn btn-outline-secondary w-100"
            onclick="resetFilters()"
          >
            <i class="fas fa-rotate-left me-2"></i>
            Reset
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- Products Table -->
  <div class="card shadow-sm border-0 rounded-4">

    <div class="card-header bg-white border-0 py-3">

      <div class="d-flex justify-content-between align-items-center">

        <h5 class="mb-0 fw-bold">
          Products List
        </h5>

        <span
          class="badge bg-primary fs-6"
          id="totalProductsCount"
        >
          0 Products
        </span>

      </div>

    </div>

    <div class="card-body p-0">

      <div class="table-responsive">

        <table
          class="table table-hover align-middle mb-0"
        >

          <thead class="table-light">

            <tr>
              <th width="100">
                Image
              </th>

              <th>
                Product
              </th>

              <th width="150">
                Price
              </th>

              <th width="120">
                Stock
              </th>

              <th width="130">
                Status
              </th>

              <th width="180">
                Actions
              </th>
            </tr>

          </thead>

          <tbody id="productsTable">

            <tr>
              <td
                colspan="6"
                class="text-center py-5"
              >
                <div
                  class="spinner-border text-primary mb-3"
                ></div>

                <p class="mb-0 text-muted">
                  Loading Products...
                </p>
              </td>
            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

  <!-- Pagination -->
  <div
    class="d-flex justify-content-center mt-4"
  >

    <ul
      class="pagination"
      id="pagination"
    ></ul>

  </div>

</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/products.js"></script>

</body>
</html>
