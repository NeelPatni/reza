<!DOCTYPE html>
<html>
<head>
  <title>Add Categoies</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="../assets/css/add-product.css"
  >

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

  <style>
/* ===== NAVBAR ===== */
.top-navbar {
  width: 100%;
  background: #ffffff;
  padding: 14px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;

  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
  position:relative;
  top: 0;
  z-index: 999;
}

/* Logo */
.top-navbar .logo {
  font-weight: 800;
  font-size: 20px;
  color: #6c63ff;
}

/* Menu */
.nav-links {
  display: flex;
  gap: 25px;
  align-items: center;
}

.nav-links a {
  text-decoration: none;
  color: #475569;
  font-weight: 500;
  font-size: 14px;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-links a:hover {
  color: #6c63ff;
}

/* Active */
.nav-links a.active {
  color: #6c63ff;
  font-weight: 600;
}

/* Logout button */
.logout-btn {
  background: #f1f5f9;
  padding: 8px 14px;
  border-radius: 10px;
}

.logout-btn:hover {
  background: #e2e8f0;
}

/* Mobile */
@media(max-width:768px){
  .nav-links {
    gap: 12px;
    font-size: 12px;
  }
}
</style>


<div class="top-navbar">
  <div class="logo">Admin</div>

  <div class="nav-links">
    <a href="dashboard.html" class="">
      <i class="fas fa-chart-line"></i> Dashboard
    </a>

    <a href="#">
      <i class="fas fa-layer-group"></i> Categories
    </a>

    <a href="products.html">
      <i class="fas fa-box"></i> Products
    </a>

    <a href="#">
      <i class="fas fa-cart-shopping"></i> Orders
    </a>

    <a href="#">
      <i class="fas fa-users"></i> Users
    </a>

    <a href="#">
      <i class="fas fa-gear"></i> Settings
    </a>

    <a href="#" onclick="logout()" class="logout-btn">
      <i class="fas fa-right-from-bracket"></i> Logout
    </a>
  </div>
</div>


<div class="container-fluid p-4">

  <div
    class="d-flex justify-content-between align-items-center mb-4"
  >
    <h2>
      <i class="fas fa-plus-circle me-2"></i>
      Add Categories
    </h2>

    <a
      href="categories.html"
      class="btn btn-secondary"
    >
      Back
    </a>
  </div>



<form id="categoryForm">

    <div class="card mb-4">

        <div class="card-header">
            Category Information
        </div>

        <div class="card-body">

            <div class="mb-3">
                <label class="form-label">
                    Category Name
                </label>

                <input
                    type="text"
                    id="name"
                    class="form-control"
                    placeholder="Enter Category Name"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Category Image
                </label>

                <input
                    type="file"
                    id="image"
                    class="form-control"
                    accept="image/*"
                >
            </div>

            <div class="mb-3">

                <img
                    id="imagePreview"
                    src=""
                    style="
                        width:180px;
                        display:none;
                        border-radius:10px;
                        border:1px solid #ddd;
                    "
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Status
                </label>

                <select
                    id="status"
                    class="form-select"
                >
                    <option value="active">
                        Active
                    </option>

                    <option value="inactive">
                        Inactive
                    </option>
                </select>

            </div>

        </div>

    </div>

    <button
        class="btn btn-primary"
        type="submit"
    >
        Save Category
    </button>

</form>

</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/add-category.js"></script>


</body>
</html>
