    <script>

/* GO TO CART */
function goToCart() {
    window.location.href = "cart.html";
}

/* CART ANIMATION */
function animateCart() {
    const cart = document.getElementById("cartCount");
    if (!cart) return;

    cart.style.transform = "scale(1.4)";
    cart.style.transition = "0.2s";

    setTimeout(() => {
        cart.style.transform = "scale(1)";
    }, 200);
}

/* UPDATE CART COUNT */
function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    
    let total = 0;

    cart.forEach(item => {
        total += item.qty ? item.qty : 1; // ✅ safe
    });

    const cartEl = document.getElementById("cartCount");
    if (cartEl) {
        cartEl.innerText = total;
    }
}

/* AUTO LOAD */
document.addEventListener("DOMContentLoaded", () => {
    updateCartCount();
});

/* AUTO SYNC BETWEEN TABS */
window.addEventListener("storage", () => {
    updateCartCount();
});

</script>

<script>

/* ✅ FIRST: function ऊपर */
function mergeCart(cart) {
    let merged = [];

    cart.forEach(item => {

        let existing = merged.find(i =>
            i.title.trim() === item.title.trim() &&
            (i.size || "M") === (item.size || "M")
        );

        if (existing) {
            existing.qty = (existing.qty || 1) + (item.qty || 1);
        } else {
            merged.push({...item});
        }

    });

    return merged;
}


/* ✅ THEN: बाकी code */
const cartItems = document.getElementById("cartItems");
const totalEl = document.getElementById("total");
const subtotalEl = document.getElementById("subtotal");

let cart = mergeCart(JSON.parse(localStorage.getItem("cart")) || []);
localStorage.setItem("cart", JSON.stringify(cart));


function renderCart() {
    cartItems.innerHTML = "";
    let total = 0;

    if (cart.length === 0) {
        cartItems.innerHTML = `
            <div class="empty-cart">
                <h2>🛒 Cart is Empty</h2>
                <p>Add some products first</p>
            </div>
        `;
        totalEl.innerText = "₹0";
        subtotalEl.innerText = "₹0";
        return;
    }

    cart.forEach((item, index) => {
        let qty = item.qty || 1;
        let itemTotal = item.price * qty;
        total += itemTotal;

        const div = document.createElement("div");
        div.className = "cart-item";

        div.innerHTML = `
            <div class="product">
                <img src="${item.image}">
                <div>
                    <h4>${item.title}</h4>
                </div>
            </div>

            <div class="size">${item.size || "M"}</div>
            <div class="price">₹${item.price}</div>

            <div class="qty-box">
                <button onclick="changeQty(${index}, -1)">−</button>
                <span>${qty}</span>
                <button onclick="changeQty(${index}, 1)">+</button>
            </div>

            <div class="item-total">₹${itemTotal}</div>
            <div class="remove" onclick="removeItem(${index})">✕</div>
        `;

        cartItems.appendChild(div);
    });

    totalEl.innerText = "₹" + total;
    subtotalEl.innerText = "₹" + total;
}


/* बाकी functions same */
function changeQty(index, change) {
    if (!cart[index].qty) cart[index].qty = 1;

    cart[index].qty += change;

    if (cart[index].qty <= 0) {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
    updateCartCount();
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
    updateCartCount();
}

function checkout() {
    alert("Order Placed 🚀");
    localStorage.removeItem("cart");
    renderCart();
    updateCartCount();
}

renderCart();

</script>
