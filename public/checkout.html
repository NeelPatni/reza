    <script>

/* GO TO CART */
function goToCart() {
    window.location.href = "cart.html";
}

/* CART ANIMATION */
function animateCart() {
    const cart = document.getElementById("cartCount");
    if (!cart) return;

    cart.style.transform = "scale(1.4)";
    cart.style.transition = "0.2s";

    setTimeout(() => {
        cart.style.transform = "scale(1)";
    }, 200);
}

/* UPDATE CART COUNT */
function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    
    let total = 0;

    cart.forEach(item => {
        total += item.qty ? item.qty : 1; // ✅ safe
    });

    const cartEl = document.getElementById("cartCount");
    if (cartEl) {
        cartEl.innerText = total;
    }
}

/* AUTO LOAD */
document.addEventListener("DOMContentLoaded", () => {
    updateCartCount();
});

/* AUTO SYNC BETWEEN TABS */
window.addEventListener("storage", () => {
    updateCartCount();
});

</script>

<script>
async function payNow() {

    if (
        !firstName.value ||
        !phone.value ||
        !email.value ||
        !address.value ||
        !city.value ||
        !state.value ||
        !pincode.value
    ) {
        alert("Please fill all required fields.");
        return;
    }

    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("Cart is empty.");
        return;
    }

    const total = cart.reduce((sum, item) => {
        return sum + Number(item.price) * Number(item.qty || 1);
    }, 0);

    const options = {

        key: "rzp_test_RJ3eLWoevWD1GE",

        amount: total * 100,

        currency: "INR",

        name: "REZA",

        description: "Order Payment",

        handler: async function (response) {

            const result = await saveOrder(
                response.razorpay_payment_id,
                cart,
                total
            );

            if (result.success) {

                localStorage.removeItem("cart");

                updateCartCount();

                alert("Payment Successful");

                window.location.href = "orders.html";

            } else {

                alert(result.message);

            }

        }

    };

    const rzp = new Razorpay(options);

    rzp.open();
}
</script>

<script>
async function saveOrder(paymentId, cart, total) {

    const orderItems = cart.map(item => ({

        product: item.id,

        name: item.title,

        image: item.image,

        quantity: item.qty || 1,

        price: Number(item.price)

    }));


    const orderData = {

        user: null,

        orderItems,

        shippingAddress: {

            fullName:
                document.getElementById("firstName").value +
                " " +
                document.getElementById("lastName").value,

            email:
                document.getElementById("email").value,

            phone:
                document.getElementById("phone").value,

            address:
                document.getElementById("address").value,

            city:
                document.getElementById("city").value,

            state:
                document.getElementById("state").value,

            pincode:
                document.getElementById("pincode").value,

            country:
                document.getElementById("country").value

        },

        paymentMethod: "RAZORPAY",

        paymentStatus: "Paid",

        orderStatus: "Pending",

        totalAmount: total,

        razorpayPaymentId: paymentId

    };


    try {

        const res = await fetch("https://khaki-cod-366220.hostingersite.com/api/orders", {

            method: "POST",

            headers: {

                "Content-Type": "application/json"

            },

            body: JSON.stringify(orderData)

        });

        return await res.json();

    } catch (err) {

        console.log(err);

        return {

            success: false,

            message: "Server Error"

        };

    }

}
</script>

<script>

const cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("orderItems");

let total = 0;

container.innerHTML = "";

cart.forEach(item => {

    const qty = item.qty || 1;

    const itemTotal = qty * Number(item.price);

    total += itemTotal;

    container.innerHTML += `

    <div class="order-item">

        <img src="${item.image}"
        style="width:70px;height:70px;object-fit:cover;border-radius:10px;">

        <div style="flex:1;padding-left:15px;">

            <h4>${item.title}</h4>

            <p>Size : ${item.size}</p>

            <p>Qty : ${qty}</p>

        </div>

        <strong>₹${itemTotal}</strong>

    </div>

    `;

});

document.getElementById("total").innerText =
"₹" + total.toLocaleString("en-IN");

</script>
